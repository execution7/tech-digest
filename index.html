<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日科技简报</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2129;
      --border: #30363d; --text: #e6edf3; --text-muted: #8b949e;
      --accent: #58a6ff; --accent-hover: #79c0ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
    }
    .container { max-width: 820px; margin: 0 auto; padding: 60px 24px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 1rem; margin-bottom: 48px; }
    .issue-list { list-style: none; }

    .issue-card {
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); margin-bottom: 16px;
      overflow: hidden; transition: border-color 0.2s, transform 0.15s;
    }
    .issue-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .issue-link {
      display: flex; align-items: stretch;
      text-decoration: none; color: inherit;
    }

    .issue-thumb {
      width: 160px; min-height: 110px; flex-shrink: 0;
      object-fit: cover; background: var(--surface2);
      border-right: 1px solid var(--border);
    }

    .issue-body {
      flex: 1; padding: 16px 20px;
      display: flex; flex-direction: column; justify-content: center;
    }

    .issue-date {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      color: var(--accent); background: rgba(88,166,255,0.1);
      padding: 2px 8px; border-radius: 3px; margin-bottom: 8px;
      width: fit-content;
    }

    .issue-title {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
      margin-bottom: 6px; line-height: 1.4;
    }
    .issue-card:hover .issue-title { color: var(--accent); }

    .issue-highlights {
      font-size: 0.82rem; color: var(--text-muted); line-height: 1.5;
    }

    .footer {
      margin-top: 64px; padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.85rem; text-align: center;
    }
    .footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 640px) {
      .container { padding: 32px 16px; }
      h1 { font-size: 1.6rem; }
      .issue-thumb { width: 100px; min-height: 90px; }
      .issue-title { font-size: 0.95rem; }
      .issue-body { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>每日科技简报</h1>
    <p class="subtitle">全球 15 个精选信息源 · AI 自动整理 · 中文阅读</p>
    <ul class="issue-list" id="issues"></ul>
    <div class="footer">
      Powered by <a href="https://cursor.com">Cursor AI</a>
    </div>
  </div>
  <script>
    fetch('issues/index.json')
      .then(r => r.json())
      .then(issues => {
        const list = document.getElementById('issues');
        issues.sort((a, b) => b.date.localeCompare(a.date));
        issues.forEach(issue => {
          const li = document.createElement('li');
          li.className = 'issue-card';
          const imgTag = issue.image
            ? `<img class="issue-thumb" src="${issue.image}" alt="" loading="lazy">`
            : '';
          li.innerHTML = `<a class="issue-link" href="issues/${issue.date}.html">
            ${imgTag}
            <div class="issue-body">
              <span class="issue-date">${issue.date}</span>
              <div class="issue-title">${issue.title}</div>
              <div class="issue-highlights">${issue.highlights}</div>
            </div>
          </a>`;
          list.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById('issues').innerHTML =
          '<li style="color:var(--text-muted);padding:20px;">暂无期刊，敬请期待...</li>';
      });
  </script>
</body>
</html>
